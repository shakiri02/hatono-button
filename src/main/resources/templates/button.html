  function playSound(file) {
    var audio = document.getElementById("audio");
    audio.src = "https://github.com/shakiri02/hatono-button/releases/download/v1.0-audio/" + file + ".wav";
    audio.play();
  }

  function buildCategories() {
    var container = document.getElementById("categories-container");
    categories.forEach(function(cat) {
      var card = document.createElement("div");
      card.className = "category-card";

      var title = document.createElement("h2");
      title.className = "category-title";
      title.textContent = cat.name;
      card.appendChild(title);

      var group = document.createElement("div");
      group.className = "button-group";

      cat.buttons.forEach(function(btn) {
        var b = document.createElement("button");
        var className = "play-button";
        if (btn.isNew) className += " is-new";
        if (btn.isrecommend) className += " is-recommend";
        b.className = className;
        b.textContent = btn.label;
        b.setAttribute("data-file", btn.file);
        b.addEventListener("click", function() {
          playSound(btn.file);
        });
        group.appendChild(b);
      });

      card.appendChild(group);
      container.appendChild(card);
    });
  }

  window.addEventListener("load", buildCategories);
</script>
